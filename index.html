<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sandbox - Enhanced</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 24px 16px; }
    .container { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 28px; width: 100%; max-width: 720px; }
    h1 { font-size: 1.4rem; color: #024230; margin-bottom: 6px; }
    .subtitle { font-size: 0.9rem; color: #6b7280; margin-bottom: 20px; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .toolbar button {
      background: #f3f4f6;
      color: #374151;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toolbar button:hover { background: #e5e7eb; }
    .toolbar button.active { background: #024230; color: white; }

    #chat-window {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      min-height: 420px;
      max-height: 600px;
      overflow-y: auto;
      padding: 14px;
      margin-bottom: 14px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.92rem;
      line-height: 1.6;
      max-width: 88%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      position: relative;
    }

    .message.user {
      background: #024230;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.ai {
      background: #E8F4F0;
      color: #1f2937;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      padding: 12px 16px;
      overflow: visible;
      border-left: 3px solid #024230;
    }

    .message.ai p { margin-bottom: 8px; }
    .message.ai p:last-child { margin-bottom: 0; }
    .message.ai ul, .message.ai ol { padding-left: 20px; margin-bottom: 8px; margin-top: 4px; }
    .message.ai ul { list-style-type: disc; }
    .message.ai ol { list-style-type: decimal; }
    .message.ai li { margin-bottom: 4px; padding-left: 4px; }
    .message.ai h1, .message.ai h2, .message.ai h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; margin-top: 10px; color: #024230; }
    .message.ai h1:first-child, .message.ai h2:first-child, .message.ai h3:first-child { margin-top: 0; }
    .message.ai strong { font-weight: 700; color: #024230; }
    .message.ai em { font-style: italic; }
    .message.ai code { background: #d1d5db; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; font-family: monospace; }
    .message.ai pre { background: #1f2937; color: #f9fafb; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .message.ai pre code { background: none; padding: 0; color: inherit; }
    .message.ai blockquote { border-left: 3px solid #CBA052; padding-left: 12px; color: #6b7280; margin: 8px 0; }
    .message.ai a { color: #024230; text-decoration: underline; }

    .message.system-msg {
      background: #FFF3CD;
      color: #856404;
      font-size: 0.8rem;
      align-self: center;
      text-align: center;
      border-radius: 20px;
      padding: 6px 14px;
      max-width: 100%;
    }

    .message.thinking {
      background: #E8F4F0;
      color: #024230;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      font-style: italic;
      border-left: 3px solid #024230;
    }

    .message.file-upload {
      background: #E8F4F0;
      color: #024230;
      align-self: flex-end;
      border-left: 3px solid #CBA052;
      font-size: 0.85rem;
    }

    .input-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 8px; }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Segoe UI', sans-serif;
      resize: vertical;
      overflow-y: auto;
      min-height: 120px;
      max-height: 400px;
      line-height: 1.5;
      width: 100%;
      display: block;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    #user-input:focus { border-color: #024230; }

    #send-btn {
      padding: 10px 20px;
      background: #024230;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      align-self: flex-end;
    }

    #send-btn:hover { background: #004d38; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .bottom-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .char-counter {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .file-input-label {
      background: #f3f4f6;
      color: #374151;
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-block;
    }

    .file-input-label:hover { background: #e5e7eb; }

    #file-input {
      display: none;
    }

    .footer {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
    }

    /* Prompt Library Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #6b7280;
    }

    .prompt-option {
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .prompt-option:hover {
      background: #f9fafb;
      border-color: #024230;
    }

    .prompt-option h4 {
      color: #024230;
      margin-bottom: 4px;
      font-size: 0.95rem;
    }

    .prompt-option p {
      font-size: 0.85rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🤖 AI Sandbox</h1>
  <p class="subtitle">Powered by Groq — Ask anything related to this course.</p>

  <textarea id="system-prompt" style="display:none;">You are a helpful instructional design assistant helping faculty improve their courses using evidence-based pedagogical practices. When a user uploads a document, analyze it carefully and provide constructive feedback. Focus on practical, actionable advice. If asked about topics unrelated to teaching and learning, politely redirect to course-related questions.</textarea>

  <!-- Toolbar -->
  <div class="toolbar">
    <button onclick="openPromptLibrary()">📚 Prompt Library</button>
    <button onclick="saveConversation()">💾 Save Chat</button>
    <label for="file-input" class="file-input-label">📎 Upload File</label>
    <input type="file" id="file-input" accept=".txt,.doc,.docx,.pdf" onchange="handleFileUpload(event)">
  </div>

  <div id="chat-window">
    <div class="message system-msg">Conversation started. Ask your question below or upload a document.</div>
  </div>

  <div class="input-row">
    <textarea id="user-input" placeholder="Type your question and press Enter... (Shift+Enter for new line)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <div class="bottom-controls">
    <div class="control-group">
      <button class="file-input-label" onclick="clearChat()">🗑 Clear Chat</button>
    </div>
    <span class="char-counter" id="char-counter">0 characters</span>
  </div>

  <div class="footer">This tool uses the Groq API. Do not share personal information.</div>
</div>

<!-- Prompt Library Modal -->
<div class="modal" id="prompt-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 style="color: #024230; font-size: 1.2rem;">Prompt Library</h2>
      <button class="modal-close" onclick="closePromptLibrary()">×</button>
    </div>
    <div id="prompt-options"></div>
  </div>
</div>

<script>
  // =============================================
  // CONFIGURATION
  // =============================================
  const BACKEND_URL = 'https://old-smoke-4ebb.rosenberger-kl.workers.dev';
  const MODEL = 'llama-3.3-70b-versatile';
  // =============================================

  marked.setOptions({ breaks: true, gfm: true });
  const chatHistory = [];
  let uploadedFileContent = null;

  const userInput = document.getElementById('user-input');
  const charCounter = document.getElementById('char-counter');

  // Prompt Library
  const promptLibrary = [
    {
      title: "TILT-Align My Assignment",
      description: "Make assignment instructions clearer using the TILT framework",
      prompt: `I'm a [YOUR DISCIPLINE] professor. Here's an assignment I give students:

[PASTE YOUR ASSIGNMENT]

Help me revise this to be more TILT-aligned by making three things crystal clear:
1. PURPOSE: Why students are doing this and how it connects to course learning outcomes
2. TASK: Exactly what students need to do, step by step
3. CRITERIA: How students will know they've succeeded

Keep my voice and expertise. Don't add educational jargon. Make it direct and student-friendly.`
    },
    {
      title: "Scaffold Complex Assignment",
      description: "Break down a complex assignment into manageable steps",
      prompt: `I assign students to [DESCRIBE COMPLEX ASSIGNMENT]. Many students get overwhelmed and don't know where to start.

Break this assignment into 5-7 manageable steps that scaffold the work. For each step:
- What students do
- Estimated time it should take
- One tip for success
- How to know you're ready to move to the next step

Make it encouraging and practical, not patronizing.`
    },
    {
      title: "Create Retrieval Practice Questions",
      description: "Generate low-stakes formative assessment questions",
      prompt: `I'm teaching [COURSE NAME] and students will complete this assignment: [PASTE ASSIGNMENT]

Create 10 retrieval practice questions that:
1. Check if students understand the key concepts they'll need
2. Are low-stakes (not graded, just for practice)
3. Mix question types: multiple choice, short answer, true/false
4. Include the correct answers with brief explanations

These are formative, not summative—they should help students know what they don't know yet.`
    },
    {
      title: "Analyze Uploaded Document",
      description: "Get feedback on assignment instructions or rubrics",
      prompt: `I've uploaded an assignment document. Please analyze it and provide:

1. Strengths: What's working well in these instructions?
2. Clarity gaps: Where might students get confused?
3. TILT alignment: How clear are the Purpose, Task, and Criteria?
4. Suggestions: 3-5 specific improvements I could make

Be constructive and specific.`
    }
  ];

  // Character counter
  userInput.addEventListener('input', function() {
    charCounter.textContent = this.value.length + ' characters';
  });

  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function appendMessage(role, text) {
    const chatWindow = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    if (role === 'ai') { div.innerHTML = marked.parse(text); } else { div.textContent = text; }
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function appendThinking() {
    const chatWindow = document.getElementById('chat-window');
    const div = document.createElement('div');
    div.className = 'message thinking';
    div.id = 'thinking-indicator';
    div.textContent = 'Thinking...';
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-indicator');
    if (el) el.remove();
  }

  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function(e) {
      const content = e.target.result;
      uploadedFileContent = content;
      
      appendMessage('file-upload', `📎 Uploaded: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`);
      
      // Auto-send a message about the uploaded file
      const autoPrompt = `I've uploaded a document called "${file.name}". Please analyze this assignment document and provide feedback on its clarity, structure, and alignment with best practices.`;
      
      userInput.value = autoPrompt;
      await sendMessage();
    };
    
    reader.readAsText(file);
    event.target.value = ''; // Reset file input
  }

  async function sendMessage() {
    const btn = document.getElementById('send-btn');
    let userText = userInput.value.trim();
    
    // If there's uploaded file content, prepend it to the message
    if (uploadedFileContent) {
      userText = `[UPLOADED DOCUMENT CONTENT]:\n${uploadedFileContent}\n\n[MY QUESTION]: ${userText}`;
    }
    
    if (!userText) return;

    appendMessage('user', userInput.value); // Show original message without file content
    chatHistory.push({ role: 'user', parts: [{ text: userText }] });
    userInput.value = '';
    charCounter.textContent = '0 characters';
    btn.disabled = true;
    appendThinking();

    const systemPrompt = document.getElementById('system-prompt').value;

    try {
      // Convert history to OpenAI format
      const messages = [{ role: 'system', content: systemPrompt }];
      for (const turn of chatHistory) {
        if (turn.role === 'user') {
          messages.push({ role: 'user', content: turn.parts[0].text });
        } else if (turn.role === 'model') {
          messages.push({ role: 'assistant', content: turn.parts[0].text });
        }
      }

      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          model: MODEL
        })
      });

      if (!response.ok) {
        throw new Error(`Backend error: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();

      if (data.error) {
        removeThinking();
        appendMessage('ai', '**Error:** ' + (data.error.message || JSON.stringify(data.error)));
      } else {
        const reply = data.choices?.[0]?.message?.content || 'No response received.';
        removeThinking();
        appendMessage('ai', reply);
        chatHistory.push({ role: 'model', parts: [{ text: reply }] });
      }

    } catch (err) {
      removeThinking();
      console.error('Error:', err);
      appendMessage('ai', '**Connection error:** ' + err.message + '. Please try again or contact support.');
    }

    // Clear uploaded file content after sending
    uploadedFileContent = null;
    btn.disabled = false;
    userInput.focus();
  }

  function clearChat() {
    const chatWindow = document.getElementById('chat-window');
    chatWindow.innerHTML = '<div class="message system-msg">Chat cleared. Start a new conversation.</div>';
    chatHistory.length = 0;
    uploadedFileContent = null;
  }

  function openPromptLibrary() {
    const modal = document.getElementById('prompt-modal');
    const optionsDiv = document.getElementById('prompt-options');
    
    optionsDiv.innerHTML = '';
    promptLibrary.forEach((prompt, index) => {
      const div = document.createElement('div');
      div.className = 'prompt-option';
      div.innerHTML = `<h4>${prompt.title}</h4><p>${prompt.description}</p>`;
      div.onclick = () => selectPrompt(index);
      optionsDiv.appendChild(div);
    });
    
    modal.classList.add('active');
  }

  function closePromptLibrary() {
    document.getElementById('prompt-modal').classList.remove('active');
  }

  function selectPrompt(index) {
    userInput.value = promptLibrary[index].prompt;
    charCounter.textContent = promptLibrary[index].prompt.length + ' characters';
    closePromptLibrary();
    userInput.focus();
  }

  function saveConversation() {
    const chatWindow = document.getElementById('chat-window');
    const messages = Array.from(chatWindow.querySelectorAll('.message:not(.system-msg)'));
    
    let content = 'AI Sandbox Conversation\n';
    content += '======================\n\n';
    
    messages.forEach(msg => {
      const role = msg.classList.contains('user') ? 'You' : 'AI';
      content += `${role}:\n${msg.textContent}\n\n`;
    });
    
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ai-sandbox-conversation-${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
